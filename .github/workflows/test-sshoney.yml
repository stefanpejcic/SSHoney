name: Test SSHoney Installation and Session

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y sshpass openssh-client python3-pip

    - name: Run SSHoney INSTALL.sh
      run: |
        chmod +x ./INSTALL.sh
        GITHUB_ACTIONS=1 ./INSTALL.sh

    - name: Wait for SSHoney service to start
      run: sleep 10

    - name: Spawn ephemeral honeypot container for test
      run: |
        CONTAINER_NAME="honeypot_test"
        LOG_FILE="session-logs/session_test.log"
        mkdir -p session-logs
        touch $LOG_FILE

        docker run -d --rm \
          --name $CONTAINER_NAME \
          -v "$PWD/$LOG_FILE:/var/log/session.log" \
          -p 2222:22 \
          ssh-honeypot-image

        # Wait a few seconds for SSH server to start
        sleep 5

    - name: Set SSH port
      run: |
        echo "PORT=2222" >> $GITHUB_ENV

    - name: Test SSH connection and run commands
      run: |
        export SSHPASS="anything"
        sshpass -e ssh -o StrictHostKeyChecking=no -p $PORT root@127.0.0.1 "whoami; pwd; ls" > test_output.txt

    - name: Check log file was created and contains commands
      run: |
        LOG_FILE="session-logs/session_test.log"
        echo "Checking log file: $LOG_FILE"
        if [ ! -f "$LOG_FILE" ]; then
          echo "Log file not found!"
          exit 1
        fi
        cat "$LOG_FILE" | grep -E "whoami|pwd|ls" || (echo "Commands not logged!" && exit 1)

    - name: Output test results
      run: |
        echo "SSH session ran successfully and commands were logged."
        cat test_output.txt
        cat session-logs/session_test.log

    - name: Cleanup test container
      if: always()
      run: |
        docker rm -f honeypot_test || true
        
